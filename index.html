<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Zone A — VR Exhibition</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- A-Frame pinned to a specific version (not "latest") so the scene
         doesn't silently change when A-Frame ships an update. -->
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>

    <!-- Shared captions loader + custom components, in <head> AFTER A-Frame
         so the components are registered before <a-scene> parses them. -->
    <script src="js/captions.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/components.js"></script>
    <!-- Swappable environment layer: presets + environment-manager. Loaded
         before <a-scene> parses so the component is registered in time. -->
    <script src="js/environment.js"></script>

    <!-- Desktop focus-overlay styles. -->
    <link rel="stylesheet" href="css/focus.css" />

    <!-- Dev-only environment HUD. Plain 2D overlay, hidden by default; the
         environment-manager shows it only when ?debug is in the URL (or you
         press `h`). Never part of the normal experience, never in VR. -->
    <style>
      #env-hud {
        position: fixed;
        left: 10px;
        bottom: 10px;
        z-index: 9999;
        font: 12px/1.4 monospace;
        color: #4caf50;
        background: rgba(0, 0, 0, 0.55);
        padding: 4px 8px;
        border-radius: 4px;
        pointer-events: none; /* never steals clicks from the scene */
        user-select: none;
      }
    </style>
  </head>
  <body>
    <!-- <a-scene> is a NEUTRAL host: it sets no background, fog, or lighting
         itself. defaultLightsEnabled:false stops A-Frame injecting its default
         light rig, so the environment presets fully own lighting. -->
    <a-scene light="defaultLightsEnabled: false">
      <!-- Preload the nine images; entities reference them by id (#atpihl-N)
           so each file is fetched and decoded once, then shared. -->
      <a-assets>
        <img id="atpihl-1" src="ATPIHL/ATPIHL1.jpg" />
        <img id="atpihl-2" src="ATPIHL/ATPIHL2.jpg" />
        <img id="atpihl-3" src="ATPIHL/ATPIHL3.jpg" />
        <img id="atpihl-4" src="ATPIHL/ATPIHL4.jpg" />
        <img id="atpihl-5" src="ATPIHL/ATPIHL5.jpg" />
        <img id="atpihl-6" src="ATPIHL/ATPIHL6.jpg" />
        <img id="atpihl-7" src="ATPIHL/ATPIHL7.jpg" />
        <img id="atpihl-8" src="ATPIHL/ATPIHL8.jpg" />
        <img id="atpihl-9" src="ATPIHL/ATPIHL9.jpg" />
      </a-assets>

      <!-- ============================================================
           ENVIRONMENT LAYER — everything atmospheric (background/sky,
           fog, lights, ground, grid, particles), swappable as one unit.
           The ring NEVER sets any of these. environment-manager builds the
           active preset's children in here and tears them down on switch.
           Starts on "void" (the migrated white look); ?env=<preset>
           overrides on load; the `e` key (desktop) or right-hand `B` button
           (VR) cycles the active set. See js/environment.js.
           ============================================================ -->
      <a-entity id="environment" environment-manager="preset: void"></a-entity>

      <!-- ============================================================
           ZONE A — the exhibition itself: ONLY the ring, its nine images
           and their audio. Sets no background / fog / lights / ground.
           zone-a-root offsets the WHOLE assembly (ring + cues + audio/focus
           triggers) as a unit; default 4 m back (-z) to make room for Zones
           B & C. Tune via the zone-a-root `offset` property — never the ring
           math or the nine coordinates.
           ============================================================ -->
      <a-entity id="zone-a" zone-a-root="offset: 0 0 -4">
        <!-- Ring container: ring-layout fills it with nine image entities. -->
        <a-entity ring-layout position="0 0 0"></a-entity>

        <!-- Per-image floor contact cue. Lives under #zone-a so it PERSISTS
             across environment switches (env teardown only touches
             #environment); it retunes its material to each preset's profile.
             Tunables: radius / opacity / softness / yoffset / color / mode. -->
        <a-entity ring-contact-cue position="0 0 0"></a-entity>
      </a-entity>

      <!-- Desktop mouse cursor + raycaster (rayOrigin: mouse). Limits hits to
           .clickable and emits mouseenter/mouseleave/click on the images. -->
      <a-entity cursor="rayOrigin: mouse" raycaster="objects: .clickable"></a-entity>

      <!-- CAMERA RIG: empty parent at floor level holding the camera + both
           controllers. VR locomotion moves the RIG (view + hands together)
           while the headset head-tracks the camera within it. -->
      <a-entity id="rig" position="0 0 0">
        <!-- Camera at standing eye height; desktop controls unchanged.
             near:0.1 (up from the 0.005 default) tightens the depth range so
             far-off surfaces — the floor, skyline plane edges — stop shimmering
             at grazing angles. far left at default so distant a-sky preset
             skies still render. -->
        <a-entity
          id="camera"
          camera="near: 0.1"
          look-controls
          wasd-controls
          position="0 1.6 0"
        ></a-entity>

        <!-- RIGHT controller: laser pointer + right-stick smooth movement.
             laser-controls fires the SAME mouseenter/mouseleave/click events
             as the desktop mouse, so image-hover and focus-on-click are
             reused as-is. raycaster objects:.clickable targets the images. -->
        <a-entity
          id="rightHand"
          laser-controls="hand: right"
          raycaster="objects: .clickable; far: 100"
          smooth-locomotion
        ></a-entity>

        <!-- LEFT controller: laser pointer + left-stick 45° snap turn. -->
        <a-entity
          id="leftHand"
          laser-controls="hand: left"
          raycaster="objects: .clickable; far: 100"
          snap-turn
        ></a-entity>
      </a-entity>
      <!-- (Comfort vignette would go here later: darken the view edges while
           smooth-locomotion is actively moving. Not added yet.) -->
    </a-scene>

    <!-- Desktop focus overlay DOM. Lives OUTSIDE <a-scene>: plain HTML/CSS
         over the canvas, so it does NOT render in VR (the VR focus view is
         built from A-Frame entities in js/focus-vr.js instead). -->
    <div id="focus-overlay">
      <div id="focus-row">
        <div id="focus-main">
          <div id="focus-col">
            <img id="focus-image" src="" alt="" />
            <div id="focus-title"></div>
            <div id="focus-meta"></div>
            <!-- Replay / stop the spoken memory. Auto-plays on open. -->
            <button id="focus-audio" type="button">Stop audio</button>
          </div>
          <button id="focus-reveal" type="button">Reveal memory</button>
        </div>
        <div id="focus-memory">
          <div id="focus-memory-inner">
            <button id="focus-memory-close" type="button" aria-label="Close memory">×</button>
            <div id="focus-memory-text"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Dev-only HUD: shows the active environment preset while cycling with
         `n`. Starts hidden; environment-manager reveals it on ?debug / `h`. -->
    <div id="env-hud" hidden>env: <span id="env-hud-name">—</span></div>

    <!-- Focus-view controllers, at END of <body> so the DOM/scene exist.
         focus-click in components.js routes to whichever is appropriate. -->
    <script src="js/focus-desktop.js"></script>
    <script src="js/focus-vr.js"></script>
  </body>
</html>
