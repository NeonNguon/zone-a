<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Zone A — VR Exhibition</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- A-Frame pinned to a specific version (not "latest") so the scene
         doesn't silently change when A-Frame ships an update. -->
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>

    <!-- Shared captions loader + custom components, in <head> AFTER A-Frame
         so the components are registered before <a-scene> parses them. -->
    <script src="js/captions.js"></script>
    <script src="js/components.js"></script>

    <!-- Desktop focus-overlay styles. -->
    <link rel="stylesheet" href="css/focus.css" />
  </head>
  <body>
    <!-- <a-scene> is the root of the scene graph. -->
    <a-scene>
      <!-- Preload the nine images; entities reference them by id (#atpihl-N)
           so each file is fetched and decoded once, then shared. -->
      <a-assets>
        <img id="atpihl-1" src="ATPIHL/ATPIHL1.jpg" />
        <img id="atpihl-2" src="ATPIHL/ATPIHL2.jpg" />
        <img id="atpihl-3" src="ATPIHL/ATPIHL3.jpg" />
        <img id="atpihl-4" src="ATPIHL/ATPIHL4.jpg" />
        <img id="atpihl-5" src="ATPIHL/ATPIHL5.jpg" />
        <img id="atpihl-6" src="ATPIHL/ATPIHL6.jpg" />
        <img id="atpihl-7" src="ATPIHL/ATPIHL7.jpg" />
        <img id="atpihl-8" src="ATPIHL/ATPIHL8.jpg" />
        <img id="atpihl-9" src="ATPIHL/ATPIHL9.jpg" />
      </a-assets>

      <!-- Ground: a flat plane rotated -90° on X so it lies horizontal. -->
      <a-plane position="0 0 0" rotation="-90 0 0" width="30" height="30" color="#eee"></a-plane>

      <!-- Sky: a large inward-facing sphere surrounding the scene. -->
      <a-sky color="#eee"></a-sky>

      <!-- Ring container: ring-layout fills it with nine image entities. -->
      <a-entity ring-layout position="0 0 0"></a-entity>

      <!-- Desktop mouse cursor + raycaster (rayOrigin: mouse). Limits hits to
           .clickable and emits mouseenter/mouseleave/click on the images. -->
      <a-entity cursor="rayOrigin: mouse" raycaster="objects: .clickable"></a-entity>

      <!-- CAMERA RIG: empty parent at floor level holding the camera + both
           controllers. VR locomotion moves the RIG (view + hands together)
           while the headset head-tracks the camera within it. -->
      <a-entity id="rig" position="0 0 0">
        <!-- Camera at standing eye height; desktop controls unchanged. -->
        <a-entity
          id="camera"
          camera
          look-controls
          wasd-controls
          position="0 1.6 0"
        ></a-entity>

        <!-- RIGHT controller: laser pointer + right-stick smooth movement.
             laser-controls fires the SAME mouseenter/mouseleave/click events
             as the desktop mouse, so image-hover and focus-on-click are
             reused as-is. raycaster objects:.clickable targets the images. -->
        <a-entity
          id="rightHand"
          laser-controls="hand: right"
          raycaster="objects: .clickable; far: 100"
          smooth-locomotion
        ></a-entity>

        <!-- LEFT controller: laser pointer + left-stick 45° snap turn. -->
        <a-entity
          id="leftHand"
          laser-controls="hand: left"
          raycaster="objects: .clickable; far: 100"
          snap-turn
        ></a-entity>
      </a-entity>
      <!-- (Comfort vignette would go here later: darken the view edges while
           smooth-locomotion is actively moving. Not added yet.) -->
    </a-scene>

    <!-- Desktop focus overlay DOM. Lives OUTSIDE <a-scene>: plain HTML/CSS
         over the canvas, so it does NOT render in VR (the VR focus view is
         built from A-Frame entities in js/focus-vr.js instead). -->
    <div id="focus-overlay">
      <div id="focus-row">
        <div id="focus-main">
          <div id="focus-col">
            <img id="focus-image" src="" alt="" />
            <div id="focus-title"></div>
            <div id="focus-meta"></div>
          </div>
          <button id="focus-reveal" type="button">Reveal memory</button>
        </div>
        <div id="focus-memory">
          <div id="focus-memory-inner">
            <button id="focus-memory-close" type="button" aria-label="Close memory">×</button>
            <div id="focus-memory-text"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Focus-view controllers, at END of <body> so the DOM/scene exist.
         focus-click in components.js routes to whichever is appropriate. -->
    <script src="js/focus-desktop.js"></script>
    <script src="js/focus-vr.js"></script>
  </body>
</html>
